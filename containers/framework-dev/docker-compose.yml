name: framework-dev-${USER}
services:
  framework-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${FRAMEWORK_SDK_TAG:-framework-sdk}
    image: ${IMAGE_FULL:-framework-dev}:latest
    pull_policy: missing
    volumes:
      - .:/mnt/current_folder:cached
      - /dev/hugepages:/dev/hugepages
    runtime: nvidia
    # DPDK / GPUDirect / hugepages require elevated privileges and host net.
    privileged: true
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - USERNAME=${USER:-developer}
      - USERID=${USER_ID:-1000}
      - GROUPID=${GROUP_ID:-1000}
    tty: true
    stdin_open: true
    entrypoint: ["/entrypoint.sh", "sleep", "infinity"]
